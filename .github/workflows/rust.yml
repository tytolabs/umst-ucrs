# Rust crate under Rust/ — isolated checkout (no MaOS mega-workspace).
name: Rust

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Rust
    steps:
      - uses: actions/checkout@v4
      - name: Read pinned umst-manifold ref
        id: manifold_pin
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          sha=$(python3 -c "import tomllib; print(tomllib.load(open('.umst-pins.toml','rb'))['umst-manifold']['sha'])")
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
      # Dev-dependency `umst-math` is a path to `../../umst-manifold/umst-math` from `Rust/`.
      - name: Clone umst-manifold for umst-math path dependency (pinned, public)
        working-directory: ${{ github.workspace }}/..
        env:
          MANIFOLD_SHA: ${{ steps.manifold_pin.outputs.sha }}
        run: |
          set -euo pipefail
          if [ -d umst-manifold/.git ]; then
            git -C umst-manifold fetch --depth 1 origin "$MANIFOLD_SHA"
            git -C umst-manifold checkout "$MANIFOLD_SHA"
          else
            git clone --depth 1 https://github.com/tytolabs/umst-manifold.git umst-manifold
            git -C umst-manifold fetch --depth 1 origin "$MANIFOLD_SHA"
            git -C umst-manifold checkout "$MANIFOLD_SHA"
          fi
          git -C umst-manifold merge-base --is-ancestor "$MANIFOLD_SHA" HEAD
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: rustfmt
        run: cargo fmt -- --check
      - name: clippy
        run: cargo clippy -- -D warnings
      - name: tests
        run: cargo test
