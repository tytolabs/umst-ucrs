# Rust crate under Rust/ — isolated checkout (no MaOS mega-workspace).
name: Rust

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Rust
    steps:
      - uses: actions/checkout@v4
      - name: Read pinned egoff ref
        id: egoff_pin
        run: |
          set -euo pipefail
          sha=$(python3 -c "import tomllib; print(tomllib.load(open('.umst-pins.toml','rb'))['egoff']['sha'])")
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
      # Dev-dependency `umst-math` is a path to `../../egoff/umst-math` from `Rust/` (private `tytolabs/egoff`).
      - name: Clone egoff for umst-math path dependency (pinned)
        working-directory: ${{ github.workspace }}/..
        env:
          TOKEN: ${{ secrets.EGOFF_READ_TOKEN || secrets.GITHUB_TOKEN }}
          EGOFF_SHA: ${{ steps.egoff_pin.outputs.sha }}
        run: |
          set -euo pipefail
          if [ -d egoff/.git ]; then
            git -C egoff fetch --depth 1 origin "$EGOFF_SHA"
            git -C egoff checkout "$EGOFF_SHA"
          else
            git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/tytolabs/egoff.git" egoff
            git -C egoff fetch --depth 1 origin "$EGOFF_SHA"
            git -C egoff checkout "$EGOFF_SHA"
          fi
          git -C egoff merge-base --is-ancestor "$EGOFF_SHA" HEAD
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: rustfmt
        run: cargo fmt -- --check
      - name: clippy
        run: cargo clippy -- -D warnings
      - name: tests
        run: cargo test
