name: Haskell

on:
  push:
    branches: [main, master]
    paths:
      - 'Haskell/**'
      - '.github/workflows/haskell.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'Haskell/**'
      - '.github/workflows/haskell.yml'

jobs:
  haskell:
    name: QuickCheck properties
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Haskell
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6'
          cabal-version: '3.10'
      - name: Build and test
        run: |
          cabal update
          cabal test all --test-show-details=streaming
