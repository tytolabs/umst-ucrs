name: Haskell

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quickcheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Haskell
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.6.5"
          cabal-version: "3.10"
      - run: cabal update
      - run: cabal test all
